<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel to PDF — Auto-Fit Table Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #16161d;
    --surface: #1c1c27;
    --surface2: #232330;
    --surface3: #2a2a3a;
    --border: #2e2e40;
    --border2: #3a3a50;
    --text: #e8e8f0;
    --text2: #a0a0b8;
    --text3: #6a6a82;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --accent-glow: rgba(108, 92, 231, 0.15);
    --green: #00b894;
    --green-bg: rgba(0, 184, 148, 0.1);
    --green-border: rgba(0, 184, 148, 0.25);
    --red: #ff6b6b;
    --amber: #fdcb6e;
    --amber-bg: rgba(253, 203, 110, 0.08);
    --gradient-1: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
    --gradient-2: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.2);
    --shadow-glow: 0 0 40px rgba(108, 92, 231, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 184, 148, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(162, 155, 254, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--gradient-1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px rgba(108, 92, 231, 0.3);
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sep { flex: 1; }

  .header-badge {
    font-size: 11px;
    color: var(--text3);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Main Content */
  .main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Upload Area */
  .upload-section {
    margin-bottom: 24px;
  }

  .drop-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-glow);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow-glow);
  }

  .drop-zone:hover::before, .drop-zone.dragover::before {
    opacity: 1;
  }

  .drop-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    filter: grayscale(0.3);
  }

  .drop-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .drop-sub {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 20px;
  }

  .drop-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: var(--gradient-1);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(108, 92, 231, 0.3);
  }

  .drop-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
  }

  /* Status bar */
  .status-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
    animation: slideDown 0.3s ease;
  }

  .status-bar.visible { display: flex; }

  .status-bar.success {
    background: var(--green-bg);
    border-color: var(--green-border);
  }

  .status-bar.error {
    background: rgba(255, 107, 107, 0.08);
    border-color: rgba(255, 107, 107, 0.25);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 2s ease infinite;
  }

  .status-bar.error .status-dot { background: var(--red); }

  .status-text {
    font-size: 13px;
    color: var(--text2);
    flex: 1;
  }

  .status-text strong { color: var(--text); font-weight: 600; }

  /* Controls */
  .toolbar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: slideDown 0.3s ease;
  }

  .toolbar.visible { display: flex; }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toolbar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .toolbar select {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .toolbar select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }

  .toolbar input[type="text"] {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    width: 320px;
    transition: border-color 0.15s;
  }

  .toolbar input[type="text"]::placeholder { color: var(--text3); }

  .toolbar input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }

  .toolbar-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  .toolbar .sep { flex: 1; }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--surface3);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .btn-pdf {
    background: var(--gradient-1);
    color: #fff;
    border: none;
    box-shadow: 0 2px 12px rgba(108, 92, 231, 0.3);
  }

  .btn-pdf:hover {
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
    border-color: transparent;
  }

  .btn-pdf:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Table Preview */
  .table-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: slideDown 0.4s ease;
  }

  .table-card.visible { display: block; }

  .table-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .table-header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .table-header-badge {
    font-size: 11px;
    color: var(--accent2);
    background: var(--accent-glow);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .table-scroll {
    overflow-x: auto;
    max-height: 520px;
    overflow-y: auto;
  }

  .table-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .table-scroll::-webkit-scrollbar-track { background: var(--bg2); }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .table-scroll::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  thead th {
    background: var(--surface3);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 2px solid var(--accent);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    text-transform: uppercase;
  }

  thead th:last-child { border-right: none; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s ease;
  }

  tbody tr:hover { background: rgba(108, 92, 231, 0.04); }

  tbody tr:nth-child(even) { background: rgba(255,255,255,0.01); }
  tbody tr:nth-child(even):hover { background: rgba(108, 92, 231, 0.04); }

  tbody td {
    padding: 8px 12px;
    border-right: 1px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    vertical-align: middle;
  }

  tbody td:last-child { border-right: none; }

  /* Numeric cells right-align */
  tbody td.num-cell {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .table-footer {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-wrap: wrap;
  }

  .table-footer-info {
    font-size: 12px;
    color: var(--text3);
  }

  /* Sheet Tabs */
  .sheet-tabs {
    display: none;
    gap: 4px;
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-wrap: nowrap;
  }

  .sheet-tabs.visible { display: flex; }

  .sheet-tab {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text3);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .sheet-tab:hover { background: var(--surface2); color: var(--text2); }

  .sheet-tab.active {
    background: var(--accent-glow);
    color: var(--accent2);
    border-color: rgba(108, 92, 231, 0.3);
  }

  /* Animations */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main { padding: 16px 12px; }
    .header { padding: 0 16px; }
    .drop-zone { padding: 32px 20px; }
    .toolbar input[type="text"] { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📊</div>
  <span class="header-title">Excel → PDF Converter</span>
  <span class="header-sep"></span>
  <span class="header-badge">Auto-Fit Columns</span>
</div>

<div class="main">

  <!-- Upload Section -->
  <div class="upload-section">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <span class="drop-icon">📁</span>
      <div class="drop-title">Drop your Excel file here</div>
      <div class="drop-sub">Supports .xlsx, .xls, .csv files — columns auto-fit to content width</div>
      <button class="drop-btn" type="button">📎 Browse Files</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot"></span>
    <span class="status-text" id="statusText"></span>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">Orientation</span>
      <select id="pdfOrientation">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
      </select>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">Page Size</span>
      <select id="pdfPageSize">
        <option value="a4">A4</option>
        <option value="a3">A3</option>
        <option value="letter">Letter</option>
        <option value="legal">Legal</option>
      </select>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">Font Size</span>
      <select id="pdfFontSize">
        <option value="6">6pt</option>
        <option value="7">7pt</option>
        <option value="8" selected>8pt</option>
        <option value="9">9pt</option>
        <option value="10">10pt</option>
        <option value="11">11pt</option>
        <option value="12">12pt</option>
      </select>
    </div>
    <span class="sep"></span>
    <button class="btn btn-pdf" id="pdfBtn" onclick="generatePDF()">📄 Generate PDF</button>
  </div>

  <!-- Table Preview -->
  <div class="table-card" id="tableCard">
    <div class="table-header">
      <span class="table-header-title" id="tableTitle">Preview</span>
      <span class="table-header-badge" id="tableBadge">0 rows × 0 cols</span>
    </div>
    <div class="sheet-tabs" id="sheetTabs"></div>
    <div class="table-scroll">
      <table>
        <thead id="tHead"></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
    <div class="table-footer">
      <span class="table-footer-info" id="footerInfo">Ready</span>
    </div>
  </div>

</div>

<script>
let workbook = null;
let currentSheet = null;
let allSheetData = {};
let fileName = '';

/* ─── FILE HANDLING ─── */
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  if (!file) return;
  fileName = file.name;
  showStatus('loading', `Reading <strong>${fileName}</strong>...`);

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      workbook = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      processWorkbook();
      showStatus('success', `Loaded <strong>${fileName}</strong> — ${workbook.SheetNames.length} sheet(s) found`);
    } catch(err) {
      showStatus('error', `Failed to read file: ${err.message}`);
    }
  };
  reader.readAsArrayBuffer(file);
}

function processWorkbook() {
  allSheetData = {};
  workbook.SheetNames.forEach(name => {
    const ws = workbook.Sheets[name];
    const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
    allSheetData[name] = json;
  });

  // Build sheet tabs
  buildSheetTabs();

  // Load first sheet
  currentSheet = workbook.SheetNames[0];
  renderSheet(currentSheet);

  // Show toolbar & table
  document.getElementById('toolbar').classList.add('visible');
  document.getElementById('tableCard').classList.add('visible');
}

function buildSheetTabs() {
  const container = document.getElementById('sheetTabs');
  container.innerHTML = '';

  if (workbook.SheetNames.length > 1) {
    container.classList.add('visible');
    workbook.SheetNames.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'sheet-tab' + (name === currentSheet ? ' active' : '');
      btn.textContent = name;
      btn.onclick = () => {
        currentSheet = name;
        document.querySelectorAll('.sheet-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSheet(name);
      };
      container.appendChild(btn);
    });
  } else {
    container.classList.remove('visible');
  }
}

function renderSheet(sheetName) {
  const data = allSheetData[sheetName];
  if (!data || data.length === 0) {
    document.getElementById('tHead').innerHTML = '';
    document.getElementById('tBody').innerHTML = '';
    document.getElementById('tableBadge').textContent = 'Empty sheet';
    return;
  }

  // Skip 1st row, use 2nd row as header
  const headers = data.length > 1 ? data[1] : data[0];
  const rows = data.slice(2).filter(r => r.some(c => c !== '' && c !== null && c !== undefined));

  // Render header
  const thead = document.getElementById('tHead');
  thead.innerHTML = '<tr>' + headers.map(h => `<th>${escHtml(String(h))}</th>`).join('') + '</tr>';

  // Render body
  const tbody = document.getElementById('tBody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    headers.forEach((_, ci) => {
      const td = document.createElement('td');
      const val = ci < row.length ? row[ci] : '';
      td.textContent = String(val);
      // Right-align numeric cells
      if (isNumeric(val)) td.classList.add('num-cell');
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // Update info
  document.getElementById('tableBadge').textContent = `${rows.length} rows × ${headers.length} cols`;
  document.getElementById('tableTitle').textContent = `Preview — ${sheetName}`;
  document.getElementById('footerInfo').textContent = `Sheet: ${sheetName} | File: ${fileName}`;
}

/* ─── PDF GENERATION ─── */
function generatePDF() {
  const data = allSheetData[currentSheet];
  if (!data || data.length === 0) {
    showStatus('error', 'No data to generate PDF.');
    return;
  }

  const btn = document.getElementById('pdfBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';

  setTimeout(() => {
    try {
      const { jsPDF } = window.jspdf;

      const orientation = document.getElementById('pdfOrientation').value;
      const pageSize = document.getElementById('pdfPageSize').value;
      const fontSize = parseInt(document.getElementById('pdfFontSize').value);

      const marginLR = 54; // 0.75 inches in points

      const doc = new jsPDF({ orientation, format: pageSize, unit: 'pt' });

      // Skip 1st row, use 2nd row as header
      const headers = (data.length > 1 ? data[1] : data[0]).map(h => String(h));
      const bodyRows = data.slice(2)
        .filter(r => r.some(c => c !== '' && c !== null && c !== undefined))
        .map(r => headers.map((_, ci) => String(ci < r.length ? (r[ci] ?? '') : '')));

      // Calculate column widths based on content
      const colWidths = calcColumnWidths(doc, headers, bodyRows, fontSize, orientation, pageSize, marginLR);

      // Use uploaded Excel first line as heading
      const firstRow = data[0] ? data[0].filter(c => c !== '' && c !== null && c !== undefined).join(' ') : 'Report';
      const title = firstRow;
      const subTitle = 'O/o the Dist. Probation officer GR.II, Proddatur  DDO COde 12082704001';

      const pageWidth = doc.internal.pageSize.getWidth();

      doc.setFontSize(13);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(30, 30, 50);
      const titleLines = title.split('\n');
      let yPos = 50;
      titleLines.forEach(line => {
        doc.text(line, pageWidth / 2, yPos, { align: 'center' });
        yPos += 15;
      });

      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text(subTitle, pageWidth / 2, yPos + 4, { align: 'center' });
      let startY = yPos + 22;

      // Generate the table
      doc.autoTable({
        head: [headers],
        body: bodyRows,
        startY: startY,
        styles: {
          font: 'helvetica',
          fontSize: fontSize,
          cellPadding: { top: 3, right: 4, bottom: 3, left: 4 },
          overflow: 'linebreak',
          lineColor: [180, 180, 190],
          lineWidth: 0.5,
          valign: 'middle',
          textColor: [30, 30, 50],
        },
        headStyles: {
          fillColor: [255, 255, 255],
          textColor: [0, 0, 0],
          fontStyle: 'bold',
          fontSize: fontSize,
          halign: 'center',
          cellPadding: { top: 5, right: 4, bottom: 5, left: 4 },
        },
        alternateRowStyles: {},
        columnStyles: buildColumnStyles(headers, bodyRows, colWidths),
        tableWidth: 'wrap',
        margin: (function() {
          const totalTableWidth = colWidths.reduce((a, b) => a + b, 0);
          const leftMargin = Math.max((pageWidth - totalTableWidth) / 2, 14);
          return { top: 30, left: leftMargin, right: 14, bottom: 20 };
        })(),
        didDrawPage: function(data) {
          // Page number footer
          const pageCount = doc.internal.getNumberOfPages();
          doc.setFontSize(8);
          doc.setTextColor(150);
          doc.text(
            `Page ${data.pageNumber} of ${pageCount}`,
            doc.internal.pageSize.getWidth() / 2,
            doc.internal.pageSize.getHeight() - 10,
            { align: 'center' }
          );
        }
      });

      // Download
      const safeName = fileName.replace(/\.[^.]+$/, '') || 'report';
      doc.save(`${safeName}_${currentSheet}.pdf`);

      showStatus('success', `PDF generated: <strong>${safeName}_${currentSheet}.pdf</strong>`);
    } catch(err) {
      showStatus('error', `PDF generation failed: ${err.message}`);
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '📄 Generate PDF';
    }
  }, 100);
}

function calcColumnWidths(doc, headers, bodyRows, fontSize, orientation, pageSize, marginLR) {
  const pageWidth = doc.internal.pageSize.getWidth();
  const availableWidth = pageWidth - (marginLR * 2); // 0.75in margins

  doc.setFontSize(fontSize);

  // Measure the maximum text width for each column
  const colCount = headers.length;
  const maxWidths = new Array(colCount).fill(0);
  const minWidths = new Array(colCount).fill(0);

  // Check header widths (with bold font)
  doc.setFont('helvetica', 'bold');
  headers.forEach((h, i) => {
    const w = doc.getTextWidth(String(h)) + 10;
    maxWidths[i] = Math.max(maxWidths[i], w);
    minWidths[i] = Math.max(minWidths[i], 20);
  });

  // Check body cell widths (normal font)
  doc.setFont('helvetica', 'normal');
  const sampleSize = Math.min(bodyRows.length, 200); // Sample first 200 rows for performance
  for (let r = 0; r < sampleSize; r++) {
    bodyRows[r].forEach((cell, ci) => {
      if (ci >= colCount) return;
      const w = doc.getTextWidth(String(cell)) + 10;
      maxWidths[ci] = Math.max(maxWidths[ci], w);
    });
  }

  // Also check remaining rows if many
  if (bodyRows.length > 200) {
    const step = Math.ceil(bodyRows.length / 100);
    for (let r = 200; r < bodyRows.length; r += step) {
      bodyRows[r].forEach((cell, ci) => {
        if (ci >= colCount) return;
        const w = doc.getTextWidth(String(cell)) + 10;
        maxWidths[ci] = Math.max(maxWidths[ci], w);
      });
    }
  }

  // ── Custom column width overrides ──
  // Columns to SHRINK (numeric allowance/deduction fields + Basic Pay)
  const narrowKeywords = [
    '1006', '1007', '2003', '2006', '2041', '2043', '2059', '2069', '2091', '1001',
    'dearness', 'house rent', 'apgli', 'professional tax', 'gpf',
    'cps', 'gis', 'flagfund', 'flag fund', 'ehs', 'basic pay'
  ];
  // Columns to WIDEN (EMP ID, Name)
  const wideKeywords = ['emp id', 'emp_id', 'empid', 'employee id', 'name', 'emp name', 'employee name'];

  headers.forEach((h, i) => {
    const hLower = String(h).toLowerCase();
    const isNarrow = narrowKeywords.some(k => hLower.includes(k));
    const isWide = wideKeywords.some(k => hLower.includes(k));

    if (isNarrow) {
      // Use only body data width (ignore long header text), with a small minimum
      doc.setFont('helvetica', 'normal');
      let bodyMax = 30; // minimum for narrow columns
      for (let r = 0; r < Math.min(bodyRows.length, 200); r++) {
        if (bodyRows[r][i]) {
          const w = doc.getTextWidth(String(bodyRows[r][i])) + 8;
          bodyMax = Math.max(bodyMax, w);
        }
      }
      maxWidths[i] = Math.max(bodyMax, 50);
    } else if (isWide) {
      // Give extra space to ID and Name columns
      maxWidths[i] = Math.max(maxWidths[i] * 1.4, 80);
    }
  });

  // Compute total desired width
  const totalDesired = maxWidths.reduce((a, b) => a + b, 0);

  // If total fits, use natural widths; otherwise scale down proportionally
  if (totalDesired <= availableWidth) {
    return maxWidths;
  }

  // Scale proportionally but ensure minimums
  const ratio = availableWidth / totalDesired;
  const scaled = maxWidths.map((w, i) => Math.max(w * ratio, minWidths[i] + 8));

  // Re-normalize if minimums pushed total over budget
  const scaledTotal = scaled.reduce((a, b) => a + b, 0);
  if (scaledTotal > availableWidth) {
    const ratio2 = availableWidth / scaledTotal;
    return scaled.map(w => w * ratio2);
  }

  return scaled;
}

function buildColumnStyles(headers, bodyRows, colWidths) {
  const styles = {};
  headers.forEach((_, ci) => {
    const isNum = bodyRows.filter(r => r[ci] && r[ci] !== '').length > 0 &&
                  bodyRows.filter(r => r[ci] && r[ci] !== '' && isNumeric(r[ci])).length / 
                  Math.max(bodyRows.filter(r => r[ci] && r[ci] !== '').length, 1) > 0.7;
    
    styles[ci] = {
      cellWidth: colWidths[ci],
      halign: isNum ? 'right' : 'left',
    };
  });
  return styles;
}

/* ─── UTILITIES ─── */
function isNumeric(val) {
  if (val === '' || val === null || val === undefined) return false;
  const s = String(val).trim().replace(/,/g, '');
  return !isNaN(s) && !isNaN(parseFloat(s));
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showStatus(type, html) {
  const bar = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  bar.classList.remove('success', 'error');
  bar.classList.add('visible', type === 'error' ? 'error' : 'success');
  text.innerHTML = html;
}
</script>
